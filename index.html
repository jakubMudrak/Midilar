<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midilar MKII</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', sans-serif;
  background: #0e0d0a;
  color: #c0bfb8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo-wrap {
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp .8s ease .1s forwards;
}
.logo-wrap svg {
  width: clamp(280px, 42vw, 620px);
  height: auto;
  display: block;
}

.mkii {
  font-size: clamp(11px, 1.2vw, 15px);
  letter-spacing: .55em;
  text-transform: uppercase;
  font-weight: 500;
  color: #666;
  margin-bottom: clamp(40px, 7vw, 80px);
  opacity: 0;
  animation: fadeUp .8s ease .3s forwards;
}

.tagline {
  font-size: clamp(13px, 1.5vw, 18px);
  letter-spacing: .42em;
  text-transform: uppercase;
  font-weight: 400;
  color: #666;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp .8s ease .5s forwards;
}

.coming-soon {
  font-size: clamp(10px, 1vw, 13px);
  letter-spacing: .42em;
  text-transform: uppercase;
  font-weight: 400;
  color: #555;
  opacity: 0;
  animation: fadeUp .8s ease .7s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}
</style>
</head>
<body>

<div class="center">

  <div class="logo-wrap">
    <svg viewBox="0 0 253.16554 51.292313" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(-263.87615,0.065101)">
        <path fill="#ffffff" d="m 263.87615,51.227204 0.036,-51.292305 26.08747,25.975927 25.32407,-25.955442 -0.0879,51.27183 z"/>
        <path fill="#ffffff" d="M 324.18164,50.947169 V 0.220762 l 11.57613,-0.0058 v 50.720641 z"/>
        <path fill="#ffffff" d="m 345.34425,0.220725 v 50.632638 l 25.1419,-25.359509 z"/>
        <path fill="#ffffff" d="M 377.4981,50.859145 V 0.22075 l 11.57612,-0.0058 v 50.632638 z"/>
        <path fill="#ffffff" d="M 398.16033,50.857387 V 0.226509 l 11.71178,-0.01151 v 39.090353 h 18.67555 v 11.543986 z"/>
        <path fill="#ffffff" d="M 439.5396,50.847637 455.71886,0.213418 471.89813,50.858965 Z"/>
        <path fill="#ffffff" d="m 482.37455,50.839777 -0.016,-50.634258 24.6897,12.263763 -17.8616,9.849052 27.85505,28.54853 z"/>
      </g>
    </svg>
  </div>

  <div class="mkii">MKII</div>
  <div class="tagline">new era of control</div>
  <div class="coming-soon">coming soon</div>

</div>

</body>
</html>
